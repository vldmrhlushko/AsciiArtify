apiVersion: apps/v1
kind: Deployment
metadata:
  name: ascii-art-deployment
  namespace: ascii-art-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ascii-art
  template:
    metadata:
      labels:
        app: ascii-art
    spec:
      containers:
      - name: ascii-art
        image: nginxdemos/hello:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ascii-art-service
  namespace: ascii-art-namespace
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: ascii-art
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ascii-art-ingress
  namespace: ascii-art-namespace
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ascii-art-service
            port:
              number: 80
